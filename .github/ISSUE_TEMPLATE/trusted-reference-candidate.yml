name: Trusted reference candidate
about: Submit a sanitized official-endpoint fingerprint candidate for maintainer review
title: "Trusted reference candidate: <provider> / <model>"
labels: [trusted-reference-candidate, needs-review]
body:
  - type: markdown
    attributes:
      value: |
        Paste only the sanitized JSON package generated by the plugin. Do not include raw prompts, completions, API keys, headers, account IDs, or screenshots.
  - type: textarea
    id: package
    attributes:
      label: Sanitized evidence package
      description: Paste the full JSON package here.
      render: json
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I confirm this package was generated from an official provider endpoint and contains no raw prompts, completions, API keys, headers, or private content.
          required: true
